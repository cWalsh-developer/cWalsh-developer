name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cWalsh-developer
          template: classic
          base: header, activity, community, repositories, metadata, achievements
          config_timezone: Europe/London

          # Safer core plugins
          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_notable: yes
          plugin_notable_from: organization

          plugin_stars: yes
          plugin_stars_limit: 4

          plugin_traffic: yes

          plugin_wakatime: yes
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 5
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_KEY }}

          # Temporarily disabled due to current upstream breakage
          # plugin_activity: yes
          # plugin_activity_days: 14
          # plugin_activity_filter: all
          # plugin_activity_limit: 5
          # plugin_activity_load: 300
          # plugin_activity_visibility: all

          # plugin_habits: yes
          # plugin_habits_days: 14
          # plugin_habits_facts: yes
          # plugin_habits_from: 200
