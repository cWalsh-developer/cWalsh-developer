name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"   # once a day at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=cWalsh-developer&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=cWalsh-developer&layout=compact&langs_count=8&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - SafeMap
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=cWalsh-developer&repo=SafeMap&theme=tokyonight
          path: profile/pin-safemap.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - PhunParty-Mobile-App
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=cWalsh-developer&repo=PhunParty-Mobile-App&theme=tokyonight
          path: profile/pin-phunparty-mobile.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
